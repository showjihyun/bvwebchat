# CD — main 머지 시 배포 아티팩트(Docker 이미지)를 빌드하고 골든 스모크로 검증.
# RQ-05/ADR-0006. 원칙: 배포 성공 기준은 "프로세스가 떴다"가 아니라
#   "골든 케이스(GA-01·GA-04)가 프로덕션 아티팩트에서 통과한다" — 스모크 실패 = 배포 실패.
#
# 사내망(RQ-17)은 GitHub 러너에서 도달 불가하므로 CI는 여기까지(이미지 검증)를
# 책임진다. 실제 반입은 docs/deploy.md의 수동 절차(검증된 이미지를 사내 서버에서
# docker run)로 둔다.
name: deploy
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      # 스모크 스크립트가 쓰는 socket.io-client 확보.
      - run: npm ci

      - name: 배포 아티팩트 빌드 (Docker 단일 컨테이너)
        run: docker build -t bvwebchat:ci .

      - name: 컨테이너 기동
        run: |
          docker run -d --name bvwebchat -p 3001:3001 bvwebchat:ci
          # 헬스체크가 200을 줄 때까지 최대 30초 대기.
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:3001/health > /dev/null 2>&1; then
              echo "[deploy] 컨테이너 헬스 OK ($i s)"; break
            fi
            if [ "$i" = "30" ]; then echo "[deploy] 헬스체크 타임아웃"; docker logs bvwebchat; exit 1; fi
            sleep 1
          done

      - name: 골든 스모크 (GA-01 격리 · GA-04 global)
        run: bash scripts/smoke.sh http://localhost:3001

      - name: 컨테이너 정리
        if: always()
        run: docker rm -f bvwebchat || true
